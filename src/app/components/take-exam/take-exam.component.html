<div class="take-exam-container">
  <mat-card class="exam-card">
    <mat-card-header>
      <mat-card-title>{{ 'TAKE_EXAM.TITLE' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ 'TAKE_EXAM.SUBTITLE' | translate }}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content class="content-body">
      <p>{{ 'TAKE_EXAM.INSTRUCTION' | translate }}</p>
      
      <mat-form-field appearance="outline" class="exam-input">
        <mat-label>{{ 'TAKE_EXAM.CODE_LABEL' | translate }}</mat-label>
        <input matInput [(ngModel)]="examCode" [placeholder]="'TAKE_EXAM.CODE_PH' | translate" (keyup.enter)="startExam()">
      </mat-form-field>
    </mat-card-content>
    
    <mat-card-actions align="end">
      <button mat-raised-button color="primary" (click)="startExam()" [disabled]="!examCode.trim()">
        {{ 'TAKE_EXAM.START_BTN' | translate }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
