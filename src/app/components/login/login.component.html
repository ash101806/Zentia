<div class="login-container">
  <mat-card class="login-card mat-elevation-z4">
    <mat-card-header>
      <div mat-card-avatar class="header-icon">
        <mat-icon>school</mat-icon>
      </div>
      <mat-card-title>{{ 'LOGIN.TITLE' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ 'LOGIN.SUBTITLE' | translate }}</mat-card-subtitle>
    </mat-card-header>

    <div class="demo-info">
      <p><strong>Demo Roles:</strong></p>
      <ul>
        <li>Username: <code>teacher</code> &rarr; Teacher Role</li>
        <li>Username: <code>any</code> &rarr; Student Role</li>
      </ul>
    </div>
    
    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'LOGIN.USERNAME' | translate }}</mat-label>
          <input matInput [(ngModel)]="username" name="username" required>
        </mat-form-field>
        
        <mat-form-field appearance="outline">
          <mat-label>{{ 'LOGIN.PASSWORD' | translate }}</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
        </mat-form-field>
        
        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.form.valid || isLoading" class="submit-btn" [class.spinner-active]="isLoading">
          <mat-spinner *ngIf="isLoading" diameter="24"></mat-spinner>
          <span *ngIf="!isLoading">{{ 'LOGIN.SUBMIT_BTN' | translate }}</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
